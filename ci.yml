name: Dynamic CI

on:
  push:
    branches: [main, dev, feature/*]
  workflow_dispatch:
    inputs:
      run_file:
        description: "File to run"
        required: false
        default: "app.py"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: echo "FILE=${{ github.event.inputs.run_file || 'app.py' }}" >> $GITHUB_ENV

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install pytest
      - run: python $FILE
      - run: pytest tests/ || echo "No tests"
