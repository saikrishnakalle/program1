name: Dynamic CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Select Branch"
        type: choice
        options:
          - main
          - dev
          - feature/test
        default: main

      program_file:
        description: "Program File"
        type: choice
        options:
          - app.py
        default: app.py

      test_file:
        description: |
          Test File — 'auto' picks the default for your branch:
          main=test_math.py | dev=test_large.py | feature/test=test_decimal.py
        type: choice
        options:
          - auto
          - test_app.py
          - test_math.py
          - test_large.py
          - test_decimal.py
        default: auto

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pytest

      - name: Run program file
        run: python ${{ github.event.inputs.program_file }}

      - name: Resolve test file for branch
        id: resolve
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          SELECTED="${{ github.event.inputs.test_file }}"

          if [ "$SELECTED" == "auto" ]; then
            case "$BRANCH" in
              main)         TEST_FILE="test_math.py" ;;
              dev)          TEST_FILE="test_large.py" ;;
              feature/test) TEST_FILE="test_decimal.py" ;;
              *)            TEST_FILE="test_app.py" ;;
            esac
            echo "ℹ️  Auto mode: branch '$BRANCH' → resolved to '$TEST_FILE'"
          else
            TEST_FILE="$SELECTED"
            echo "ℹ️  Manual override: using '$TEST_FILE'"
          fi

          echo "test_file=$TEST_FILE" >> $GITHUB_OUTPUT

      - name: Check test file exists in branch
        run: |
          TEST="${{ steps.resolve.outputs.test_file }}"
          if [ ! -f "$TEST" ]; then
            echo "❌ ERROR: '$TEST' does not exist in branch '${{ github.event.inputs.branch }}'"
            echo "   Available test files in this branch:"
            ls test_*.py 2>/dev/null || echo "   (none found)"
            exit 1
          fi
          echo "✅ Found: $TEST"

      - name: Always run test_app.py (common baseline)
        run: pytest test_app.py -v

      - name: Run branch-specific test file
        run: pytest ${{ steps.resolve.outputs.test_file }} -v
